name: Update README card

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/stats-card.yml"
      - "scripts/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Bownlux&theme=dark&count_private=true&show_icons=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate issues-solved card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/issues-solved.sh Bownlux profile/issues-solved.svg

      - name: Bust image cache in README
        run: |
          TS=$(date +%s)
          sed -i -E "s|stats\.svg\?v=[0-9]+|stats.svg?v=${TS}|g" README.md
          sed -i -E "s|issues-solved\.svg\?v=[0-9]+|issues-solved.svg?v=${TS}|g" README.md

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/stats.svg profile/issues-solved.svg README.md
          git diff --cached --quiet || git commit -m "Update README card"
          git push
