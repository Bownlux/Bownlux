name: Update README card

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/stats-card.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Bownlux&theme=dark&count_private=true&show_icons=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bust image cache in README
        run: |
          TS=$(date +%s)
          sed -i -E "s|stats\.svg\?v=[0-9]+|stats.svg?v=${TS}|g" README.md

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/stats.svg README.md
          git diff --cached --quiet || git commit -m "Update README card"
          git push
